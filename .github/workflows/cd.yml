name: CD

on:
  push:
    tags:
      - "v*.*.*"

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-frontend:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to staging
    needs: [docker-backend, docker-frontend]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && !contains(github.ref_name, 'prod')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            TAG="${{ github.ref_name }}"
            TAG="${TAG#v}"
            TMP_DIR="$(mktemp -d)"

            curl -fsSL "https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz" -o "$TMP_DIR/source.tar.gz"
            mkdir -p /opt/masspay
            find /opt/masspay -mindepth 1 -maxdepth 1 ! -name .env -exec rm -rf {} +
            tar -xzf "$TMP_DIR/source.tar.gz" -C "$TMP_DIR"
            SRC_DIR="$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            cp -a "$SRC_DIR"/. /opt/masspay/
            rm -rf "$TMP_DIR"

            cd /opt/masspay
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${TAG}"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${TAG}"
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.staging.yml pull backend frontend
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
            docker system prune -f

  deploy-prod:
    name: Deploy to production
    needs: [docker-backend, docker-frontend]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && contains(github.ref_name, 'prod')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/masspay
            docker compose pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
