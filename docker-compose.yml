services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: masspay_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: masspay_bf
      POSTGRES_USER: masspay
      POSTGRES_PASSWORD: ${DB_PASSWORD:-masspay_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups:ro
    ports:
      - "${POSTGRES_PORT_BIND:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masspay -d masspay_bf"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: masspay_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD est requis}
      --appendonly yes
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_BIND:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend Go ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masspay_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: ${ENV:-dev}
      PORT: 8080
      GIN_MODE: ${GIN_MODE:-release}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://masspay:${DB_PASSWORD:-masspay_secret}@postgres:5432/masspay_bf?sslmode=${POSTGRES_SSLMODE:-prefer}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET est requis}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      REFRESH_EXPIRY_DAYS: ${REFRESH_EXPIRY_DAYS:-30}
      SEED_SUPER_ADMIN: ${SEED_SUPER_ADMIN:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@mynapay.bf}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-MynaPay@2026!}
      SUPER_ADMIN_FIRST_NAME: ${SUPER_ADMIN_FIRST_NAME:-Super}
      SUPER_ADMIN_LAST_NAME: ${SUPER_ADMIN_LAST_NAME:-Admin}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
      RATE_LIMIT_LOGIN_PER_MIN: ${RATE_LIMIT_LOGIN_PER_MIN:-10}
      RATE_LIMIT_FINANCIAL_PER_MIN: ${RATE_LIMIT_FINANCIAL_PER_MIN:-5}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      TOTP_REQUIRED: ${TOTP_REQUIRED:-false}
      DEFAULT_COMMISSION_RATE: ${DEFAULT_COMMISSION_RATE:-0.015}
      VALIDATION_THRESHOLD: ${VALIDATION_THRESHOLD:-500000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-30}
      ORANGE_MONEY_ENV: ${ORANGE_MONEY_ENV:-test}
      ORANGE_MONEY_TEST_URL: ${ORANGE_MONEY_TEST_URL:-https://testom.orange.bf/}
      ORANGE_MONEY_PROD_URL: ${ORANGE_MONEY_PROD_URL:-https://apiom.orange.bf/}
      ORANGE_MONEY_MERCHANT_MSISDN: ${ORANGE_MONEY_MERCHANT_MSISDN:-}
      ORANGE_MONEY_BENEFICIARY_MSISDN: ${ORANGE_MONEY_BENEFICIARY_MSISDN:-}
      ORANGE_MONEY_USSD_MSISDN: ${ORANGE_MONEY_USSD_MSISDN:-}
      ORANGE_MONEY_API_USERNAME: ${ORANGE_MONEY_API_USERNAME:-}
      ORANGE_MONEY_API_PASSWORD: ${ORANGE_MONEY_API_PASSWORD:-}
      ORANGE_MONEY_PROVIDER: ${ORANGE_MONEY_PROVIDER:-101}
      ORANGE_MONEY_PAYID: ${ORANGE_MONEY_PAYID:-12}
      ORANGE_MONEY_CASHIN_TOKEN_URL: ${ORANGE_MONEY_CASHIN_TOKEN_URL:-}
      ORANGE_MONEY_CASHIN_URL: ${ORANGE_MONEY_CASHIN_URL:-}
      ORANGE_MONEY_CASHIN_API_KEY: ${ORANGE_MONEY_CASHIN_API_KEY:-}
      ORANGE_MONEY_CASHIN_USERNAME: ${ORANGE_MONEY_CASHIN_USERNAME:-}
      ORANGE_MONEY_CASHIN_PASSWORD: ${ORANGE_MONEY_CASHIN_PASSWORD:-}
      ORANGE_MONEY_AGENT_ALIAS: ${ORANGE_MONEY_AGENT_ALIAS:-}
      ORANGE_MONEY_AGENT_PIN: ${ORANGE_MONEY_AGENT_PIN:-}
      ORANGE_MONEY_PIN_PUBLIC_KEY: ${ORANGE_MONEY_PIN_PUBLIC_KEY_CONTAINER:-/run/secrets/orange/pin_public_key.pem}
      ORANGE_MONEY_CERT_PUBLIC: ${ORANGE_MONEY_CERT_PUBLIC_CONTAINER:-/run/secrets/orange/star_orange_bf.pem}
      ORANGE_MONEY_CERT_PRIVATE: ${ORANGE_MONEY_CERT_PRIVATE_CONTAINER:-/run/secrets/orange/OrangeBFV22026.key}
      MOOV_ENV: ${MOOV_ENV:-test}
      MOOV_TEST_URL: ${MOOV_TEST_URL:-https://uat.moov-money.bf:38443}
      MOOV_PROD_URL: ${MOOV_PROD_URL:-}
      MOOV_USERNAME: ${MOOV_USERNAME:-}
      MOOV_PASSWORD: ${MOOV_PASSWORD:-}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MynaPay}
      MAIL_API_URL: ${MAIL_API_URL:-}
      MAIL_API_KEY: ${MAIL_API_KEY:-}
      MAIL_TIMEOUT_SECONDS: ${MAIL_TIMEOUT_SECONDS:-10}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
    volumes:
      - ${ORANGE_MONEY_CERTS_DIR:-./certs/orange}:/run/secrets/orange:ro
    ports:
      - "${BACKEND_PORT_BIND:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend Next.js ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: masspay_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_APP_NAME: MynaPay BF
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT_BIND:-3000}:3000"

  # ── PostgreSQL Backup ───────────────────────────────────────────
  pg-backup:
    image: alpine:3.20
    container_name: masspay_backup
    profiles:
      - backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      BACKUP_PG_DATABASE: masspay_bf
      BACKUP_PG_USER: masspay
      BACKUP_PG_PASSWORD: ${DB_PASSWORD:-masspay_secret}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-eu-west-3}
      BACKUP_RETENTION_DAYS: 7
    volumes:
      - ./scripts/backup-pg.sh:/usr/local/bin/backup-pg:ro
      - ./backups:/backups
      - /etc/localtime:/etc/localtime:ro
    command: >
      sh -c "
        apk add --no-cache postgresql-client aws-cli &&
        while true; do
          echo '[backup] Démarrage backup à \$$(date)' &&
          backup-pg &&
          echo '[backup] Prochain backup dans 24h' &&
          sleep 86400
        done
      "

volumes:
  postgres_data:
  redis_data:
