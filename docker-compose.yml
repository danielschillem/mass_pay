version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: masspay_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: masspay_bf
      POSTGRES_USER: masspay
      POSTGRES_PASSWORD: ${DB_PASSWORD:-masspay_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masspay -d masspay_bf"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: masspay_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend Go ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masspay_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8080
      GIN_MODE: release
      DATABASE_URL: postgres://masspay:${DB_PASSWORD:-masspay_secret}@postgres:5432/masspay_bf?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET est requis}
      JWT_EXPIRY_HOURS: 24
      DEFAULT_COMMISSION_RATE: 0.015
      VALIDATION_THRESHOLD: 500000
      WORKER_CONCURRENCY: 5
      MAX_RETRIES: 3
      RETRY_DELAY_SECONDS: 30
      ORANGE_BASE_URL: ${ORANGE_BASE_URL:-}
      ORANGE_API_KEY: ${ORANGE_API_KEY:-}
      ORANGE_ACCOUNT_ID: ${ORANGE_ACCOUNT_ID:-}
      MOOV_BASE_URL: ${MOOV_BASE_URL:-}
      MOOV_API_KEY: ${MOOV_API_KEY:-}
      MOOV_ACCOUNT_ID: ${MOOV_ACCOUNT_ID:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend Next.js ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: masspay_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_APP_NAME: MassPay BF
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
