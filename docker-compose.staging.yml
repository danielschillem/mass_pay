services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-masspay-backend:staging}
    environment:
      ENV: staging
      GIN_MODE: release
      LOG_LEVEL: ${LOG_LEVEL:-info}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    image: ${FRONTEND_IMAGE:-masspay-frontend:staging}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}

  nginx:
    image: nginx:1.27-alpine
    container_name: masspay_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/deploy/masspay-letsencrypt:/etc/letsencrypt:ro
      - /home/deploy/masspay-certbot-www:/var/www/certbot:ro
